# 故意設計成有問題的範例，對應 Demo 1 (Port 衝突) 與 Demo 2 (localhost 錯誤)
services:
  web:
    image: nginx:latest
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Demo 2: 在 Docker 內用 localhost 連 DB 會失敗，應該改用 service name "db"
      - DATABASE_URL=postgresql://user:pass@localhost:5432/app
    # 缺少 restart policy / healthcheck，可用來測試 compose_analyzer 的檢查

  db:
    image: postgres:16
    ports:
      # Demo 1: 5432 容易與本機已安裝的 PostgreSQL 衝突
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=app
