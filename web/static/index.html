<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DockDoctor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🩺 DockDoctor</h1>
      <p>Docker Compose 專案診斷工具</p>
    </header>

    <form id="scanForm">
      <div class="form-group">
        <label>遠端 Docker Host</label>
        <input type="text" id="dockerHost" value="unix:///var/run/docker.sock" required>
        <small>本機填 unix:///var/run/docker.sock；遠端填 tcp://主機IP:2375</small>
      </div>

      <div class="form-group">
        <label>docker-compose.yml</label>
        <input type="file" id="composeFile" accept=".yml,.yaml" required>
      </div>

      <div class="form-group">
        <label>Compose 專案名稱 <span class="optional">（選填）</span></label>
        <input type="text" id="projectName" placeholder="例如：myapp">
        <small>用來篩選 container，留空則顯示所有 container</small>
      </div>

      <button type="submit" id="scanBtn">開始診斷</button>
      <p id="status" class="status"></p>
    </form>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>診斷中...</p>
    </div>

    <div id="results" class="hidden">
      <h2>診斷結果</h2>

      <section>
        <h3>📋 Compose 設定檢查</h3>
        <ul id="composeIssues"></ul>
      </section>

      <section>
        <h3>🖥️ Container 狀態</h3>
        <div id="containerStatus"></div>
        <ul id="containerIssues"></ul>
      </section>

      <section>
        <h3>🔌 Port 衝突</h3>
        <ul id="portConflicts"></ul>
      </section>

      <section>
        <h3>📜 Log 分析</h3>
        <div id="logFindings"></div>
      </section>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
